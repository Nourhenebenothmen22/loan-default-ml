# Docker Compose pour le projet Loan Default ML
# Ce fichier définit les services nécessaires pour l'API et le suivi des modèles

services:
  # Service de l'API de prédiction
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loan-prediction-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - ENV=production
    restart: always

  # Service MLflow pour le suivi des expériences
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow-server
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    command: >
      mlflow server 
      --backend-store-uri sqlite:///app/mlflow.db 
      --default-artifact-root /app/mlruns 
      --host 0.0.0.0 
      --port 5000
    restart: always

volumes:
  mlruns:
  models:
